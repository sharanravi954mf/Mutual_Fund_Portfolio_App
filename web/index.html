<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Premium Mutual Fund Portfolio tracker by Sharan Fincorp.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sharan Fincorp">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Sharan Fincorp</title>
  <link rel="manifest" href="manifest.json">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (let registration of registrations) {
          registration.unregister();
          console.log("Unregistered service worker to force new build reload.");
        }
      });
    }
  </script>
  <!-- PDFJS Library for client-side text extraction -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <!-- SheetJS Library for client-side XLS/XLSX/CSV processing -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    window.extractPdfText = function(pdfBytes, id) {
      try {
        // Convert pdfBytes to Uint8Array safely
        let bytes = pdfBytes;
        if (pdfBytes && pdfBytes.buffer) {
          bytes = new Uint8Array(pdfBytes.buffer);
        } else if (pdfBytes && pdfBytes.bytes) {
          bytes = new Uint8Array(pdfBytes.bytes);
        } else {
          bytes = new Uint8Array(pdfBytes);
        }

        pdfjsLib.getDocument({ data: bytes }).promise.then(async function(pdf) {
          let fullText = "";
          for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const textContent = await page.getTextContent();
            const pageText = textContent.items.map(item => item.str).join(" ");
            fullText += pageText + "\n";
          }
          window['pdf_result_' + id] = { text: fullText, error: null };
        }).catch(function(err) {
          console.error("PDFJS failed to process document:", err);
          window['pdf_result_' + id] = { text: null, error: err.toString() };
        });
      } catch (err) {
        console.error("PDFJS failed synchronously:", err);
        window['pdf_result_' + id] = { text: null, error: err.toString() };
      }
    };

    window.renderPdfPageToImage = function(pdfBytes, pageNum, id) {
      try {
        let bytes = pdfBytes;
        if (pdfBytes && pdfBytes.buffer) {
          bytes = new Uint8Array(pdfBytes.buffer);
        } else if (pdfBytes && pdfBytes.bytes) {
          bytes = new Uint8Array(pdfBytes.bytes);
        } else {
          bytes = new Uint8Array(pdfBytes);
        }

        pdfjsLib.getDocument({ data: bytes }).promise.then(async function(pdf) {
          let targetPage = pageNum;
          if (pageNum === -1 || pageNum > pdf.numPages) {
            targetPage = pdf.numPages;
          }
          const page = await pdf.getPage(targetPage);
          
          const viewport = page.getViewport({ scale: 1.5 });
          const canvas = document.createElement('canvas');
          const context = canvas.getContext('2d');
          canvas.height = viewport.height;
          canvas.width = viewport.width;

          await page.render({
            canvasContext: context,
            viewport: viewport
          }).promise;

          const dataUrl = canvas.toDataURL('image/png');
          window['pdf_render_result_' + id] = { dataUrl: dataUrl, error: null };
        }).catch(function(err) {
          console.error("PDFJS render failed:", err);
          window['pdf_render_result_' + id] = { dataUrl: null, error: err.toString() };
        });
      } catch (err) {
        console.error("PDFJS render failed synchronously:", err);
        window['pdf_render_result_' + id] = { dataUrl: null, error: err.toString() };
      }
    };

    window.updateExcelMetadataJS = function(excelBytes, pdfFilesJson, bookType, id) {
      try {
        let pdfFiles = JSON.parse(pdfFilesJson);
        let bytes = excelBytes;
        if (excelBytes && excelBytes.buffer) {
          bytes = new Uint8Array(excelBytes.buffer);
        } else if (excelBytes && excelBytes.bytes) {
          bytes = new Uint8Array(excelBytes.bytes);
        } else {
          bytes = new Uint8Array(excelBytes);
        }

        const workbook = XLSX.read(bytes, { type: 'array' });
        let updatedCount = 0;

        for (let sheetName of workbook.SheetNames) {
          const sheet = workbook.Sheets[sheetName];
          if (!sheet['!ref']) continue;

          const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
          if (rows.length < 2) continue;

          const headers = rows[0].map(h => String(h || '').toLowerCase().trim());

          const filenameColIndex = headers.findIndex(h => h.includes('file name') || h.includes('filename'));
          if (filenameColIndex === -1) continue;

          const invoiceNoColIndex = headers.findIndex(h => h.includes('cams invoi'));
          if (invoiceNoColIndex === -1) continue;

          for (let r = 1; r < rows.length; r++) {
            const row = rows[r];
            const invoiceNo = String(row[invoiceNoColIndex] || '').trim();
            if (!invoiceNo) continue;

            const cleanInvoiceNo = invoiceNo.toLowerCase().replace(/[^a-z0-9]/g, '');
            if (!cleanInvoiceNo) continue;

            let bestMatchPdf = null;
            for (const pdf of pdfFiles) {
              const cleanFilename = pdf.filename.toLowerCase().replace(/[^a-z0-9]/g, '');
              if (cleanFilename.includes(cleanInvoiceNo)) {
                bestMatchPdf = pdf;
                break;
              }
            }

            if (bestMatchPdf) {
              const cell_ref = XLSX.utils.encode_cell({ c: filenameColIndex, r: r });
              if (sheet[cell_ref]) {
                sheet[cell_ref].v = bestMatchPdf.filename;
              } else {
                sheet[cell_ref] = { t: 's', v: bestMatchPdf.filename };
              }
              updatedCount++;
            }
          }
        }

        let exportType = 'xlsx';
        const updatedBytes = XLSX.write(workbook, { type: 'array', bookType: exportType });
        window['excel_result_' + id] = { 
          bytes: Array.from(new Uint8Array(updatedBytes)), 
          count: updatedCount, 
          error: null 
        };
      } catch (err) {
        console.error("SheetJS failed:", err);
        window['excel_result_' + id] = { bytes: null, count: 0, error: err.toString() };
      }
    };
  </script>
</head>

  <script src="flutter_bootstrap.js" async></script>
</body>
