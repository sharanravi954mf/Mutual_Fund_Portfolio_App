<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Premium Mutual Fund Portfolio tracker by Sharan Fincorp.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sharan Fincorp">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Sharan Fincorp</title>
  <link rel="manifest" href="manifest.json">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (let registration of registrations) {
          registration.unregister();
          console.log("Unregistered service worker to force new build reload.");
        }
      });
    }
  </script>
  <!-- PDFJS Library for client-side text extraction -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <!-- SheetJS Library for client-side XLS/XLSX/CSV processing -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    window.extractPdfText = function(pdfBytes, id) {
      try {
        // Convert pdfBytes to Uint8Array safely
        let bytes = pdfBytes;
        if (pdfBytes && pdfBytes.buffer) {
          bytes = new Uint8Array(pdfBytes.buffer);
        } else if (pdfBytes && pdfBytes.bytes) {
          bytes = new Uint8Array(pdfBytes.bytes);
        } else {
          bytes = new Uint8Array(pdfBytes);
        }

        pdfjsLib.getDocument({ data: bytes }).promise.then(async function(pdf) {
          let fullText = "";
          for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const textContent = await page.getTextContent();
            const pageText = textContent.items.map(item => item.str).join(" ");
            fullText += pageText + "\n";
          }
          window['pdf_result_' + id] = { text: fullText, error: null };
        }).catch(function(err) {
          console.error("PDFJS failed to process document:", err);
          window['pdf_result_' + id] = { text: null, error: err.toString() };
        });
      } catch (err) {
        console.error("PDFJS failed synchronously:", err);
        window['pdf_result_' + id] = { text: null, error: err.toString() };
      }
    };

    window.renderPdfPageToImage = function(pdfBytes, pageNum, id) {
      try {
        let bytes = pdfBytes;
        if (pdfBytes && pdfBytes.buffer) {
          bytes = new Uint8Array(pdfBytes.buffer);
        } else if (pdfBytes && pdfBytes.bytes) {
          bytes = new Uint8Array(pdfBytes.bytes);
        } else {
          bytes = new Uint8Array(pdfBytes);
        }

        pdfjsLib.getDocument({ data: bytes }).promise.then(async function(pdf) {
          let targetPage = pageNum;
          if (pageNum === -1 || pageNum > pdf.numPages) {
            targetPage = pdf.numPages;
          }
          const page = await pdf.getPage(targetPage);
          
          const viewport = page.getViewport({ scale: 1.5 });
          const canvas = document.createElement('canvas');
          const context = canvas.getContext('2d');
          canvas.height = viewport.height;
          canvas.width = viewport.width;

          await page.render({
            canvasContext: context,
            viewport: viewport
          }).promise;

          const dataUrl = canvas.toDataURL('image/png');
          window['pdf_render_result_' + id] = { dataUrl: dataUrl, error: null };
        }).catch(function(err) {
          console.error("PDFJS render failed:", err);
          window['pdf_render_result_' + id] = { dataUrl: null, error: err.toString() };
        });
      } catch (err) {
        console.error("PDFJS render failed synchronously:", err);
        window['pdf_render_result_' + id] = { dataUrl: null, error: err.toString() };
      }
    };

    window.updateExcelMetadataJS = function(excelBytes, pdfFiles, bookType, id) {
      try {
        let bytes = excelBytes;
        if (excelBytes && excelBytes.buffer) {
          bytes = new Uint8Array(excelBytes.buffer);
        } else if (excelBytes && excelBytes.bytes) {
          bytes = new Uint8Array(excelBytes.bytes);
        } else {
          bytes = new Uint8Array(excelBytes);
        }

        // 1. Read workbook using SheetJS (supports .xlsx, .xls, .csv, etc.)
        const workbook = XLSX.read(bytes, { type: 'array' });
        let updatedCount = 0;

        // Helper to find header column index
        function findHeaderIndex(headers, targets) {
          for (let target of targets) {
            let idx = headers.indexOf(target.toLowerCase().trim());
            if (idx !== -1) return idx;
          }
          return -1;
        }

        // Helper to calculate match score
        function matchScore(row, headers, textLower, filenameLower, indices) {
          let score = 0;
          
          // GSTR match
          if (indices.gstr !== -1 && row[indices.gstr]) {
            let val = String(row[indices.gstr]).toLowerCase().trim();
            if (val && textLower.indexOf(val) !== -1) score += 100;
          }
          
          // Ref No match
          if (indices.refNo !== -1 && row[indices.refNo]) {
            let val = String(row[indices.refNo]).toLowerCase().trim();
            if (val && textLower.indexOf(val) !== -1) score += 100;
          }
          
          // AMC Match
          if (indices.amc !== -1 && row[indices.amc]) {
            let val = String(row[indices.amc]).toLowerCase().trim();
            if (val) {
              let parts = val.split(/\s+/).filter(p => p.length > 2);
              let matchCount = 0;
              for (let p of parts) {
                if (textLower.indexOf(p) !== -1) matchCount++;
              }
              if (matchCount > 0) score += matchCount * 15;
              if (filenameLower.indexOf(val) !== -1) score += 40;
            }
          }
          
          // Fund Code
          if (indices.fundCode !== -1 && row[indices.fundCode]) {
            let val = String(row[indices.fundCode]).toLowerCase().trim();
            if (val && textLower.indexOf(val) !== -1) score += 30;
          }
          
          return score;
        }

        // Process each sheet
        for (let sheetName of workbook.SheetNames) {
          const sheet = workbook.Sheets[sheetName];
          const ref = sheet['!ref'];
          if (!ref) continue;
          const range = XLSX.utils.decode_range(ref);
          
          // Extract rows as raw arrays for scoring
          const rows = [];
          for (let R = range.s.r; R <= range.e.r; ++R) {
            const row = [];
            for (let C = range.s.c; C <= range.e.c; ++C) {
              const cell_ref = XLSX.utils.encode_cell({ c: C, r: R });
              const cell = sheet[cell_ref];
              row.push(cell ? (cell.v !== undefined ? cell.v : cell.w) : null);
            }
            rows.push(row);
          }
          
          if (rows.length === 0) continue;
          
          // Get headers from first row
          const headers = rows[0].map(h => String(h || '').toLowerCase().trim());
          
          const indices = {
            gstr: findHeaderIndex(headers, ["amc gstr number", "gstr number", "gstin", "amcgstrnumber"]),
            refNo: findHeaderIndex(headers, ["invoice reference no", "invoice ref no", "ref no", "invoicereferenceno"]),
            amc: findHeaderIndex(headers, ["amc", "amc name", "fund house"]),
            fundCode: findHeaderIndex(headers, ["fund code", "fundcode"]),
            invoiceNo: findHeaderIndex(headers, ["invoice no", "invoiceno", "invoice number"]),
            invoiceDate: findHeaderIndex(headers, ["invoice date", "invoicedate"]),
            filename: findHeaderIndex(headers, ["file name", "filename"])
          };
          
          if (indices.invoiceNo === -1 || indices.invoiceDate === -1) continue;
          
          // For each PDF file
          for (let pdf of pdfFiles) {
            const textLower = String(pdf.text || '').toLowerCase();
            const filenameLower = String(pdf.filename || '').toLowerCase();
            
            let bestRowIndex = -1;
            let highestScore = 0;
            
            for (let r = 1; r < rows.length; r++) {
              const score = matchScore(rows[r], headers, textLower, filenameLower, indices);
              if (score > highestScore) {
                highestScore = score;
                bestRowIndex = r;
              }
            }
            
            if (bestRowIndex !== -1 && highestScore >= 25) {
              // Extract Invoice No (Standard CAMS format regex)
              const invNoRegex = /(?:invoice|inv|bill)\s*(?:serial\s*)?(?:no|number|ref\s*no)?\.?\s*[:\-\s]\s*([a-zA-Z0-9/\-_]+)/i;
              const invNoMatch = String(pdf.text).match(invNoRegex);
              const invoiceNo = invNoMatch ? invNoMatch[1].trim() : '';
              
              // Extract Invoice Date
              const dateRegex = /(?:invoice|inv|bill)?\s*date\s*[:\-\s]\s*([0-9]{2}[/\.\-\s][0-9]{2}[/\.\-\s][0-9]{4}|[0-9]{2}[/\.\-\s][a-zA-Z]{3}[/\.\-\s][0-9]{4})/i;
              const dateMatch = String(pdf.text).match(dateRegex);
              const invoiceDate = dateMatch ? dateMatch[1].trim() : '';
              
              // Update SheetJS cells in place
              function updateCell(r, c, val) {
                const cell_ref = XLSX.utils.encode_cell({ c: c, r: r });
                sheet[cell_ref] = { t: 's', v: val };
              }
              
              updateCell(bestRowIndex, indices.invoiceNo, invoiceNo);
              updateCell(bestRowIndex, indices.invoiceDate, invoiceDate);
              if (indices.filename !== -1) {
                updateCell(bestRowIndex, indices.filename, pdf.filename);
              }
              updatedCount++;
            }
          }
        }

        // Determine proper export output format
        let exportType = 'xlsx';
        if (bookType === '.xls') exportType = 'biff8';
        else if (bookType === '.csv') exportType = 'csv';

        const updatedBytes = XLSX.write(workbook, { type: 'array', bookType: exportType });
        window['excel_result_' + id] = { 
          bytes: Array.from(new Uint8Array(updatedBytes)), 
          count: updatedCount, 
          error: null 
        };
      } catch (err) {
        console.error("SheetJS failed:", err);
        window['excel_result_' + id] = { bytes: null, count: 0, error: err.toString() };
      }
    };
  </script>
</head>
